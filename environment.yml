name: lean-reinforcement
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy
  - matplotlib
  - jupyter
  - ipykernel
  # PyTorch stack for GPU
  - pytorch
  - pytorch-cuda=12.1
  # Dependencies for lean-dojo and other tools
  - loguru
  - networkx
  - lxml
  - pygithub
  - deprecated
  # Dependencies for RL and testing
  - psutil
  - nvidia-ml-py3
  - pip:
    - chardet
    - lean-dojo
    - pytest
    - seaborn
    - optuna
    - vllm
    - tensorboard
